<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotas Escolares | Modelo Híbrido</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- Leaflet Routing Machine CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    
    <!-- Custom style.css -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Google Fonts for Premium Aesthetics -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Leaflet Map Container -->
    <div id="map"></div>

    <!-- Glassmorphism Control Sidebar -->
    <div class="sidebar">
        <h1>Rotas Escolares</h1>
        <p style="font-size: 0.85em; text-align: center; color: #94a3b8; margin-top: -5px; margin-bottom: 15px;">
            Planeje trajetos com múltiplas paradas otimizados via Nominatim & ViaCEP
        </p>

        <!-- Origin Point -->
        <div class="input-group">
            <label for="origin">Origem (Início):</label>
            <input type="text" id="origin" placeholder="Digite o CEP ou endereço de partida" autocomplete="off">
            <div class="autocomplete-results" id="autocomplete-origin" style="display: none;"></div>
        </div>

        <!-- Dynamic Waypoints (Stops) -->
        <div id="stops-container"></div>

        <!-- Add Stop Button -->
        <button id="add-stop" class="gradient-button" style="margin-top: 0; margin-bottom: 10px;">
            + Adicionar Parada
        </button>

        <!-- Destination Point -->
        <div class="input-group">
            <label for="destination">Destino (Fim):</label>
            <input type="text" id="destination" placeholder="Digite o CEP ou endereço final" autocomplete="off">
            <div class="autocomplete-results" id="autocomplete-destination" style="display: none;"></div>
        </div>

        <!-- Calculate Route Button -->
        <button id="get-route" class="gradient-button" style="font-weight: bold; background-image: linear-gradient(to right, #00f0ff, #ff00ff); box-shadow: 0 4px 15px rgba(255, 0, 255, 0.3);">
            Calcular Rota Otimizada
        </button>

        <!-- Route Information & Details -->
        <div id="route-details">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px;">
                <div>
                    <span style="display: block; font-size: 0.75em; color: #94a3b8; text-transform: uppercase;">Distância</span>
                    <span id="total-distance" style="font-size: 1.1em; font-weight: bold; color: #00f0ff;">-</span>
                </div>
                <div style="text-align: right;">
                    <span style="display: block; font-size: 0.75em; color: #94a3b8; text-transform: uppercase;">Duração</span>
                    <span id="total-time" style="font-size: 1.1em; font-weight: bold; color: #ff00ff;">-</span>
                </div>
            </div>
            
            <h3>Instruções do Percurso</h3>
            <ul id="instructions-list">
                <li style="color: #64748b; font-style: italic; text-align: center; border-bottom: none;">
                    Aguardando cálculo da rota...
                </li>
            </ul>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Leaflet Routing Machine JS -->
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    
    <!-- Custom Application Logic -->
    <script src="app.js"></script>
</body>
</html>
